name: Bug Report
description: Create a report to help us improve
title: "[BUG] "
labels: ["type-bug"]
body:
  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: Please list the steps to reproduce this issue.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    attributes:
      label: Environment Details
      description: OS, Application Version, Database, Browser (if applicable)
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: Add any other context about the problem here. For example, was this discovered during a specific audit cycle or data migration?
    validations:
      required: false

